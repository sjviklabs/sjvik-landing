version: 2
updates:
  # Node.js dependencies — security + minor/patch updates weekly.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    groups:
      # Batch non-breaking updates into a single PR per group
      # so CI runs once and review is easier.
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
        update-types:
          - minor
          - patch
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
        update-types:
          - minor
          - patch
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - minor
          - patch
      nanostores:
        patterns:
          - "nanostores"
          - "@nanostores/*"
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # GitHub Actions — keep action versions fresh.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(ci)"
