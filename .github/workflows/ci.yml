name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      # Copy opt-in beta PDFs (not committed to the repo) into the build
      # output, matching the current deploy step's behavior.
      - name: Include beta PDFs if present
        run: |
          if [ -d static-assets/beta ]; then
            mkdir -p dist/beta
            cp -v static-assets/beta/* dist/beta/
          fi

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
          if-no-files-found: error
          # Required to include dist/.htaccess — the action skips dotfiles by default.
          include-hidden-files: true
