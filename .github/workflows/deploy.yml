name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npx astro build

      - name: Copy beta PDFs into dist
        run: |
          if [ -d static-assets/beta ]; then
            mkdir -p dist/beta
            cp static-assets/beta/* dist/beta/
          fi

      - name: Deploy to Hostinger via FTP
        run: |
          sudo apt-get install -y lftp > /dev/null 2>&1
          lftp -u "${{ secrets.HOSTINGER_USER }},${{ secrets.HOSTINGER_PASS }}" ftp://191.101.13.246 -e "
            set ssl:verify-certificate no;
            set ftp:ssl-allow yes;
            mirror --reverse --delete --verbose --exclude tahala/ --exclude homelab/ --exclude stories/ --exclude genealogy/ --exclude preview/ dist/ domains/stevenjvik.tech/public_html/;
            bye
          "
