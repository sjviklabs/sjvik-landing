name: Deploy

on:
  # Fire automatically after a successful CI run on main.
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  # Also allow manual re-deploy from the Actions tab.
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy-production
    # Only run if the triggering CI workflow succeeded OR this is a manual dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://stevenjvik.tech

    steps:
      - name: Download CI build artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v8
        with:
          name: dist-${{ github.event.workflow_run.head_sha }}
          path: dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      # Manual dispatch path — rebuild from the current main tip so
      # `gh workflow run Deploy` works without a pending CI run.
      - name: Checkout (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6

      - name: Setup Node (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install + build (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          npm ci
          npm run build
          if [ -d static-assets/beta ]; then
            mkdir -p dist/beta
            cp -v static-assets/beta/* dist/beta/
          fi

      - name: Deploy to Hostinger via FTPS
        # Hard cap so a hung FTP connection doesn't burn a full job-hour.
        # Hostinger has been inconsistent about accepting FTPS connections
        # from GitHub-hosted Azure runners; fail fast so we can retry.
        timeout-minutes: 10
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: 191.101.13.246
          username: ${{ secrets.HOSTINGER_USER }}
          password: ${{ secrets.HOSTINGER_PASS }}
          protocol: ftps
          local-dir: ./dist/
          server-dir: domains/stevenjvik.tech/public_html/
          # Preserve peer subdomain folders and out-of-build files.
          exclude: |
            **/tahala/**
            **/homelab/**
            **/stories/**
            **/genealogy/**
            **/preview/**
            **/DO_NOT_UPLOAD_HERE
          # Action defaults: dangerous-clean-slate=false (incremental mirror),
          # log-level=standard, timeout=30000ms per connection.
          log-level: standard
          timeout: 60000

      - name: Smoke-test the live site
        run: |
          echo "Waiting 10s for FTP writes + Cloudflare edge to settle..."
          sleep 10
          fail=0
          for path in "/" "/experience" "/projects" "/guides" "/about" "/noc/"; do
            status=$(curl -sI -L -o /dev/null -w "%{http_code}" -A "ci-smoke-test" "https://stevenjvik.tech$path")
            if [ "$status" = "200" ]; then
              echo "  ✓ $path → $status"
            else
              echo "  ✗ $path → $status (expected 200)"
              fail=1
            fi
          done
          # Verify the stale-resume redirect survived the deploy
          status=$(curl -sI -o /dev/null -w "%{http_code}" "https://stevenjvik.tech/assets/Steven_J_Vik_Resume.pdf")
          if [ "$status" = "301" ]; then
            echo "  ✓ /assets/Steven_J_Vik_Resume.pdf → 301 (redirect preserved)"
          else
            echo "  ✗ .htaccess redirect missing — got $status, expected 301"
            fail=1
          fi
          exit $fail
